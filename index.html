<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="a coffee shop website, for coffee lovers!">
    <link rel="stylesheet" href="style/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <title>Coffee Teeth</title>
</head>
<body>
    <header id="header" onmouseenter="mouseenter()" onmouseleave="mouseleave()">
        <h1>Coffee Teeth</h1>
        <nav>
            <ul>
                <li><button id="but1" onclick="clickhome()">HOME</button></li>
                <li><button id="but2" onclick="clickstore()">STORE</button></li>
                <li><button id="but3" onclick="clickabout()">ABOUT</button></li>
                <li><button id="but4" onclick="clickcontact()">CONTACT</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <article id="home">
            home
        </article>

        <article id="store" hidden>
            store
        </article>

        <article id="about" hidden>
            about
        </article>

        <article id="contact" hidden>
            contact
        </article>

        <script>
            var header = document.getElementById('header')

            var but1 = document.getElementById('but1')
            var but2 = document.getElementById('but2')
            var but3 = document.getElementById('but3')
            var but4 = document.getElementById('but4')

            function mouseenter() {
                header.style.color = '#000'
            
                but1.style.color = '#000'
                but2.style.color = '#000'
                but3.style.color = '#000'
                but4.style.color = '#000'
            }

            function mouseleave() {
                header.style.color = '#fff'

                but1.style.color = '#fff'
                but2.style.color = '#fff'
                but3.style.color = '#fff'
                but4.style.color = '#fff'
            }

        </script>

        <script src="script/nav-script.js"></script>
    </main>
</body>
</html>
